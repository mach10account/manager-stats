<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1a56c9">
<title>Manager Stats — Salone Vincente</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2345c8dc'/%3E%3Cstop offset='.55' stop-color='%232286dd'/%3E%3Cstop offset='1' stop-color='%23113c9f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='15' fill='url(%23g)'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-family='Georgia,serif' font-size='28' fill='white'%3ESV%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/app.css">
</head>
<body>

<!-- ── defs condivise: rametto di foglie (stile logo) + gradiente brand ──── -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="svGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#45c8dc"/>
      <stop offset=".55" stop-color="#2286dd"/>
      <stop offset="1" stop-color="#113c9f"/>
    </linearGradient>
    <symbol id="leafSprig" viewBox="0 0 200 240">
      <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M28 228 C 60 190, 96 140, 150 24"/>
        <g id="lf">
          <path d="M0 0 C 8 -12, 9 -27, 1 -38 C -8 -27, -7 -12, 0 0 Z"/>
          <path d="M0 -7 L 0.5 -30"/>
        </g>
        <use href="#lf" transform="translate(46,203) rotate(72) scale(0.9)"/>
        <use href="#lf" transform="translate(60,187) rotate(-8)"/>
        <use href="#lf" transform="translate(78,164) rotate(66) scale(0.95)"/>
        <use href="#lf" transform="translate(93,141) rotate(-14)"/>
        <use href="#lf" transform="translate(110,113) rotate(60) scale(0.9)"/>
        <use href="#lf" transform="translate(124,87) rotate(-18) scale(0.95)"/>
        <use href="#lf" transform="translate(139,58) rotate(54) scale(0.85)"/>
        <use href="#lf" transform="translate(150,32) rotate(16) scale(0.8)"/>
      </g>
    </symbol>
  </defs>
</svg>

<!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
<div id="login" class="hidden">
  <svg class="login-leaf leaf-a" viewBox="0 0 200 240" aria-hidden="true"><use href="#leafSprig"/></svg>
  <svg class="login-leaf leaf-b" viewBox="0 0 200 240" aria-hidden="true"><use href="#leafSprig"/></svg>
  <div class="login-card">
    <svg class="login-mark" viewBox="0 0 48 48" aria-hidden="true">
      <circle cx="24" cy="24" r="23" fill="url(#svGrad)"/>
      <circle cx="24" cy="24" r="19" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="0.8"/>
      <text class="mark-sv" x="24" y="30.5" text-anchor="middle" font-size="17" font-weight="600" fill="#fff" letter-spacing="1">SV</text>
    </svg>
    <h1 class="login-title">Manager Stats</h1>
    <div class="login-brand">Salone Vincente</div>
    <p class="login-sub">Accedi con le credenziali fornite.</p>
    <form id="loginForm" autocomplete="on">
      <label>Email
        <input type="email" id="loginEmail" autocomplete="username" required>
      </label>
      <label>Password
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </label>
      <button type="submit" id="loginSubmit">Accedi</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────────────────── -->
<div id="shell" class="hidden">
  <header>
    <svg class="header-leaf" viewBox="0 0 200 240" aria-hidden="true"><use href="#leafSprig"/></svg>
    <a class="brand" href="#/panoramica">
      <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
        <circle cx="24" cy="24" r="22.5" fill="rgba(255,255,255,.13)" stroke="rgba(255,255,255,.8)" stroke-width="1.2"/>
        <circle cx="24" cy="24" r="18.5" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="0.7"/>
        <text class="mark-sv" x="24" y="30.5" text-anchor="middle" font-size="17" font-weight="600" fill="#fff" letter-spacing="1">SV</text>
      </svg>
      <span class="brand-text">
        <span class="brand-name">Manager Stats</span>
        <span class="brand-sub">Salone Vincente</span>
      </span>
    </a>
    <nav id="nav">
      <a href="#/panoramica" data-path="/panoramica">Panoramica</a>
      <a href="#/marketing"  data-path="/marketing">Marketing</a>
      <a href="#/coorti"     data-path="/coorti">Coorti</a>
      <a href="#/chiamate"   data-path="/chiamate">Chiamate</a>
    </nav>
    <span id="freshness"></span>
    <button id="logout" class="logout-btn">Esci</button>
  </header>

  <div class="filters filter-bar" id="filterBar">
    <div class="filters-row" id="datePresets">
      <span class="filter-cap">Periodo</span>
      <button data-days="0">Oggi</button>
      <button data-days="ieri">Ieri</button>
      <button data-days="7">7 giorni</button>
      <button data-days="30" class="active">30 giorni</button>
      <button data-days="90">90 giorni</button>
      <button data-days="mtd">Mese corrente</button>
      <button data-days="lastm">Mese scorso</button>
      <span class="custom">
        dal <input type="date" id="fromDate"> al <input type="date" id="toDate">
        <button id="applyCustom">Applica</button>
      </span>
    </div>
    <div class="filters-row">
      <span class="filter-cap">Consulente</span>
      <label class="consulente-wrap">
        <select id="consulenteSelect"><option value="">Tutti i consulenti</option></select>
      </label>
    </div>
  </div>

  <div id="app"></div>
</div>

<!-- ── host condivisi: tooltip + modal esiti ─────────────────────────────── -->
<div id="tooltip"></div>
<div id="esitiModal" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="emTitle"></h3>
      <button class="modal-close" id="emClose" title="Chiudi">✕</button>
    </div>
    <div class="modal-sub" id="emSub"></div>
    <div class="modal-legend">
      <span class="key"><span class="swatch" style="background:var(--series-2)"></span>Appuntamento</span>
      <span class="key"><span class="swatch" style="background:var(--series-1)"></span>Altri esiti</span>
      <span class="key"><span class="swatch" style="background:var(--muted)"></span>Riga automatica / non lavorato</span>
    </div>
    <div id="emBody"></div>
  </div>
</div>

<footer>Salone Vincente · Dati: Notion + CRM4 → Supabase · Dashboard manager</footer>

<script type="module" src="./js/app.js"></script>
</body>
</html>
